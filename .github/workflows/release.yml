name: Release

# Cuts a GitHub Release whenever a version tag (e.g. v2.1.0) is pushed, or when
# triggered manually from the Actions tab. Builds the NAR artifacts and attaches
# them to the release with auto-generated notes.
#
# Tags are only pushable by maintainers, so this workflow never runs from fork code.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# `contents: write` is required to create the release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build artifacts & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build the NAR artifacts. GPG signing and the docker-image module are skipped
      # here; enable the opt-in jobs below if you want signed Central deploys / images.
      - name: Build NAR artifacts
        run: mvn -B -ntp clean package -Dgpg.skip=true -pl '!docker-image'

      - name: Create GitHub Release and attach NARs
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            nifi-pulsar-nar/target/*.nar
            nifi-pulsar-client-service-nar/target/*.nar

  # Build the streamnative/nifi image and push it to GitHub Container Registry
  # (ghcr.io). Uses the built-in GITHUB_TOKEN — no extra secrets required. The
  # image is tagged with the release version (from the pom, our single source of
  # truth) and `latest`.
  docker:
    name: Build & push Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Full build including the docker-image module: the fabric8 plugin produces
      # the local image `streamnative/nifi:latest` during the package phase.
      - name: Build image
        run: mvn -B -ntp clean package -Dgpg.skip=true

      - name: Resolve image coordinates
        id: img
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR namespaces must be lowercase
          version="$(mvn -q -N help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "image=ghcr.io/${owner}/nifi" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          VERSION: ${{ steps.img.outputs.version }}
        run: |
          docker tag streamnative/nifi:latest "${IMAGE}:${VERSION}"
          docker tag streamnative/nifi:latest "${IMAGE}:latest"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

  # ---------------------------------------------------------------------------
  # OPT-IN: deploy signed artifacts to Sonatype OSSRH / Maven Central.
  # Requires repo secrets: OSSRH_USERNAME, OSSRH_PASSWORD,
  # MAVEN_GPG_PRIVATE_KEY, MAVEN_GPG_PASSPHRASE.
  # ---------------------------------------------------------------------------
